name: "CodeQL config"

# Add project-specific CodeQL tuning here, e.g. `paths-ignore:` to skip
# generated/vendored code, or a `query-filters:` block to suppress a
# specific alert on a specific path once you've reviewed it.  Example:
#
#   query-filters:
