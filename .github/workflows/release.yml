name: Release

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force version bump (leave empty for auto)'
        type: choice
        default: ''
        options:
          - ''
          - patch
          - minor
          - major

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release
      cancel-in-progress: false

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.6"

      - name: Setup Python
        run: uv python install 3.12

      - name: Semantic Version Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.RELEASE_TOKEN }}
          git_committer_name: "github-actions"
          git_committer_email: "actions@users.noreply.github.com"
          force: ${{ inputs.force }}

      - name: Update versioned manifests to released version
        if: steps.release.outputs.released == 'true'
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          # server.json
          jq --arg v "$VERSION" '
            .version = $v |
            .packages |= map(
              if .registryType == "pypi" then .version = $v
              elif .registryType == "oci" then .identifier = ("ghcr.io/pvliesdonk/scholar-mcp:v" + $v)
              else . end
            )
          ' server.json > server.json.tmp
          mv server.json.tmp server.json

          # Claude Code plugin.json
          jq --arg v "$VERSION" '.version = $v' \
            .claude-plugin/plugin/.claude-plugin/plugin.json > plugin.json.tmp
          mv plugin.json.tmp .claude-plugin/plugin/.claude-plugin/plugin.json

          # Claude Code .mcp.json — keep --from spec in lockstep with plugin.json
          jq --arg v "$VERSION" '
            ."scholar-mcp".args = [
              "--from", ("pvliesdonk-scholar-mcp[mcp]==" + $v),
              "scholar-mcp", "serve"
            ]
          ' .claude-plugin/plugin/.mcp.json > mcp.json.tmp
          mv mcp.json.tmp .claude-plugin/plugin/.mcp.json

          uv lock
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add server.json uv.lock \
                  .claude-plugin/plugin/.claude-plugin/plugin.json \
                  .claude-plugin/plugin/.mcp.json
          git diff --cached --quiet || git commit -m "chore: update manifests to v${VERSION} [skip ci]"
          git push

          # Re-point the release tag to the manifest-bump commit so that
          # marketplace installs (which checkout .claude-plugin/plugin at
          # ref: vVERSION) get the updated plugin.json and .mcp.json.
          #
          # Trade-off: downstream jobs (publish-docker) sign images at the
          # original tag SHA; after this force-push the tag SHA and the
          # attestation SHA diverge. Acceptable because the only delta is
          # version strings in JSON manifests, not executable code. A
          # pre-release hook would avoid this but python-semantic-release
          # doesn't support pre-tag hooks that modify the working tree.
          git tag -f "v${VERSION}"
          git push --force origin "refs/tags/v${VERSION}"

      - name: Build package
        if: steps.release.outputs.released == 'true'
        run: uv build

      - name: Generate SBOM
        if: steps.release.outputs.released == 'true'
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d  # v0.23.1
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload SBOM to GitHub Release
        if: steps.release.outputs.released == 'true'
        run: gh release upload ${{ steps.release.outputs.tag }} sbom.cdx.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release Assets
        uses: python-semantic-release/publish-action@v10.5.3
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}

      - name: Upload build artifacts
        if: steps.release.outputs.released == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}

  publish-pypi:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pvliesdonk-scholar-mcp

    permissions:
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1
        with:
          packages-dir: dist/
          print-hash: true
          verbose: true

  publish-docker:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
          fetch-depth: 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version components
        id: version
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$(echo "$VERSION" | cut -d. -f1)" >> $GITHUB_OUTPUT
          echo "minor=$(echo "$VERSION" | cut -d. -f1-2)" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ steps.version.outputs.version }}
            type=raw,value=v${{ steps.version.outputs.minor }}
            type=raw,value=v${{ steps.version.outputs.major }}
          labels: |
            org.opencontainers.image.title=scholar-mcp
            org.opencontainers.image.description=FastMCP server for Semantic Scholar with OpenAlex enrichment and docling PDF conversion
            org.opencontainers.image.vendor=pvliesdonk
            io.modelcontextprotocol.server.name=io.github.pvliesdonk/scholar-mcp

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM for Docker image
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d  # v0.23.1
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-docker.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest Docker SBOM
        uses: actions/attest-sbom@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          sbom-path: sbom-docker.cdx.json
          push-to-registry: true

  publish-linux-packages:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
          fetch-depth: 1

      - name: Create output directory
        run: mkdir -p dist

      - name: Bake package version into postinstall script
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: sed -i "s|\${VERSION:-}|${VERSION}|" packaging/scripts/postinstall.sh

      - name: Build .deb package
        uses: burningalchemist/action-gh-nfpm@eeac96f42da23d091eec0d0088bf05cac0ceb9f3  # v1
        id: deb
        with:
          nfpm_version: "2.41.1"
          packager: deb
          config: packaging/nfpm.yaml
          target: dist/
        env:
          VERSION: ${{ needs.release.outputs.version }}
          ARCH: amd64

      - name: Build .rpm package
        uses: burningalchemist/action-gh-nfpm@eeac96f42da23d091eec0d0088bf05cac0ceb9f3  # v1
        id: rpm
        with:
          nfpm_version: "2.41.1"
          packager: rpm
          config: packaging/nfpm.yaml
          target: dist/
        env:
          VERSION: ${{ needs.release.outputs.version }}
          ARCH: x86_64

      - name: Create versionless copies for stable download URLs
        run: |
          cp dist/scholar-mcp_*.deb dist/scholar-mcp_latest.deb
          cp dist/scholar-mcp-*.rpm dist/scholar-mcp_latest.rpm

      - name: Upload packages to GitHub Release
        run: gh release upload ${{ needs.release.outputs.tag }} dist/*.deb dist/*.rpm --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mcpb:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb@2.1.2
      - name: Render templates
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          mkdir -p build/mcpb/src
          # Restrict substitution to ${VERSION} only — other ${...} tokens
          # (e.g. ${DOCUMENTS}, ${user_config.*}) are runtime placeholders
          # for the mcpb host and must survive intact.
          envsubst '${VERSION}' < packaging/mcpb/manifest.json.in  > build/mcpb/manifest.json
          envsubst '${VERSION}' < packaging/mcpb/pyproject.toml.in > build/mcpb/pyproject.toml
          cp packaging/mcpb/src/server.py build/mcpb/src/server.py
      - name: Validate and pack
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          mcpb validate build/mcpb/manifest.json
          mkdir -p dist
          mcpb pack build/mcpb "dist/scholar-mcp-${VERSION}.mcpb"
      - uses: actions/upload-artifact@v4
        with:
          name: mcpb-bundle
          path: dist/scholar-mcp-*.mcpb
          if-no-files-found: error

  publish-mcpb:
    needs: [release, build-mcpb]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mcpb-bundle
          path: dist/
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
            "${{ needs.release.outputs.tag }}" \
            dist/scholar-mcp-*.mcpb \
            --clobber \
            --repo "${{ github.repository }}"

  publish-claude-plugin-pr:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout catalog repo
        uses: actions/checkout@v4
        with:
          repository: pvliesdonk/claude-plugins
          token: ${{ secrets.CLAUDE_PLUGINS_PAT }}
          path: catalog
      - name: Bump marketplace.json entry
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          cd catalog
          jq --arg v "$VERSION" --arg ref "v$VERSION" '
            .plugins |= map(
              if .name == "scholar-mcp"
              then .version = $v | .source.ref = $ref
              else . end
            )
          ' .claude-plugin/marketplace.json > marketplace.json.tmp
          mv marketplace.json.tmp .claude-plugin/marketplace.json
      - name: Validate marketplace entry was updated
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          cd catalog
          grep -q "\"version\": \"${VERSION}\"" .claude-plugin/marketplace.json || {
            echo "::error::scholar-mcp entry not found or not updated in marketplace.json"
            exit 1
          }
      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          path: catalog
          token: ${{ secrets.CLAUDE_PLUGINS_PAT }}
          branch: bump/scholar-mcp-${{ needs.release.outputs.version }}
          title: "chore: bump scholar-mcp to v${{ needs.release.outputs.version }}"
          body: |
            Auto-generated bump from [scholar-mcp ${{ needs.release.outputs.tag }}](https://github.com/pvliesdonk/scholar-mcp/releases/tag/${{ needs.release.outputs.tag }}).
          commit-message: "chore: bump scholar-mcp to v${{ needs.release.outputs.version }}"
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"

  publish-registry:
    needs: [release, publish-pypi, publish-docker]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Install mcp-publisher
        env:
          MCP_PUBLISHER_VERSION: v1.5.0
          # SHA256 from registry_1.5.0_checksums.txt
          MCP_PUBLISHER_SHA256: 79bbb73ba048c5906034f73ef6286d7763bd53cf368ea0b358fc593ed360cbd5
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz" -o mcp-publisher.tar.gz
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c
          tar xz -f mcp-publisher.tar.gz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
