coverage:
  precision: 2
  round: down
  range: "60...90"

  status:
    project:
      default:
        target: 80%
        threshold: 2%
        if_no_uploads: error
        if_not_found: success
        if_ci_failed: error

    patch:
      default:
        target: 80%
        threshold: 5%
        if_no_uploads: error
        if_not_found: success
        if_ci_failed: error

ignore:
  - "tests/**"
  - "docs/**"
  - "src/markdown_vault_mcp/__main__.py"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
  require_base: true
  require_head: true
